 <!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Screen Demo</title>

<style>
body {
  margin: 0;
  background: #f2f2f2;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  text-align: center;
}

h1 {
  margin-top: 40px;
  font-weight: 600;
}

.card {
  width: 85%;
  margin: 30px auto;
  padding: 30px;
  border-radius: 20px;
  background: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  transition: 0.3s ease;
  position: relative;
}

.confidential {
  font-size: 18px;
  font-weight: 600;
}

.description {
  margin-top: 10px;
  font-size: 14px;
  color: #666;
}

.overlay {
  position: absolute;
  inset: 0;
  border-radius: 20px;
  background: black;
  opacity: 0;
  transition: 0.3s ease;
  pointer-events: none;
}

.stats {
  margin-top: 20px;
  font-size: 14px;
  color: #444;
}

button {
  margin-top: 40px;
  width: 85%;
  padding: 18px;
  border-radius: 15px;
  border: none;
  background: #ff3b30;
  color: white;
  font-size: 16px;
  font-weight: 600;
}
</style>
</head>

<body>

<h1>Privacy Screen Demo</h1>

<div class="card" id="card">
  <div class="overlay" id="overlay"></div>
  <div class="confidential">🔒 Confidential</div>
  <div class="description">
    This content is only visible when your phone faces you directly.
  </div>
</div>

<div class="stats">
  Pitch: <span id="pitch">0</span>° <br>
  Roll: <span id="roll">0</span>° <br>
  Darkness: <span id="darkness">0</span>%
</div>

<button onclick="startDemo()">Start Demo</button>

<script>
let active = false;

async function startDemo() {

  if (typeof DeviceOrientationEvent.requestPermission === "function") {
    const permission = await DeviceOrientationEvent.requestPermission();
    if (permission !== "granted") {
      alert("Permission denied");
      return;
    }
  }

  active = true;

  window.addEventListener("deviceorientation", (event) => {
    if (!active) return;

    const pitch = event.beta || 0;
    const roll = event.gamma || 0;

    document.getElementById("pitch").innerText = pitch.toFixed(2);
    document.getElementById("roll").innerText = roll.toFixed(2);

    const tiltAmount = Math.min(Math.abs(roll) / 45, 1);
    const darkness = tiltAmount * 0.85;

    document.getElementById("darkness").innerText =
      Math.round(darkness * 100);

    document.getElementById("overlay").style.opacity = darkness;
  });
}
</script>

</body>
</html>
