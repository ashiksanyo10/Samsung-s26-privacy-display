<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Screen Demo</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg,#0f0f0f,#1c1c1e);
  font-family: -apple-system,BlinkMacSystemFont,sans-serif;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 40px;
  font-weight: 600;
  letter-spacing: -0.5px;
}

.card {
  width: 85%;
  margin: 40px auto;
  padding: 30px;
  border-radius: 25px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  position: relative;
  overflow: hidden;
  transition: transform 0.2s ease;
}

.confidential {
  font-size: 20px;
  font-weight: 600;
}

.description {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.7;
}

.mask {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(0,0,0,0.9),
    rgba(0,0,0,0.0) 40%,
    rgba(0,0,0,0.0) 60%,
    rgba(0,0,0,0.9)
  );
  opacity: 0;
  transition: opacity 0.2s ease;
  pointer-events: none;
}

.stats {
  margin-top: 20px;
  font-size: 13px;
  opacity: 0.6;
}

button {
  margin-top: 40px;
  width: 85%;
  padding: 18px;
  border-radius: 18px;
  border: none;
  background: linear-gradient(90deg,#ff3b30,#ff9500);
  color: white;
  font-size: 16px;
  font-weight: 600;
}
</style>
</head>

<body>

<h1>Privacy Screen</h1>

<div class="card" id="card">
  <div class="mask" id="mask"></div>
  <div class="confidential">🔒 Confidential</div>
  <div class="description">
    Visible only at correct viewing angle
  </div>
</div>

<div class="stats">
  Roll: <span id="roll">0</span>°
</div>

<button onclick="startDemo()">Start Demo</button>

<script>
function handleOrientation(event) {
  if (!active) return;

  const roll = event.gamma ?? 0;

  document.getElementById("roll").innerText = roll.toFixed(2);

  const intensity = Math.min(Math.abs(roll) / 45, 1);

  const mask = document.getElementById("mask");

  const shift = roll * 2;

  mask.style.background = `
    linear-gradient(
      to right,
      rgba(0,0,0,0.95),
      rgba(0,0,0,0.0) ${40 + shift}%,
      rgba(0,0,0,0.0) ${60 + shift}%,
      rgba(0,0,0,0.95)
    )
  `;
}
</script>

</body>
</html>
