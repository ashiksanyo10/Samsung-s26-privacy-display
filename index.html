<!DOCTYPE html>
<html>
<head>
  <title>Privacy Screen Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
      text-align: center;
    }

    #screen {
      width: 90%;
      height: 60%;
      background: #111;
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      transition: 0.3s;
    }
  </style>
</head>
<body>

<div id="screen">Move your phone 👀</div>
 <script>
  const screen = document.getElementById("screen");

  async function start() {
    if (typeof DeviceOrientationEvent.requestPermission === "function") {
      try {
        const permission = await DeviceOrientationEvent.requestPermission();
        if (permission !== "granted") {
          screen.innerText = "Permission denied";
          return;
        }
      } catch (e) {
        screen.innerText = "Permission error";
        return;
      }
    }

    window.addEventListener("deviceorientation", (event) => {
      const tilt = Math.abs(event.gamma || 0);

      if (tilt > 20) {
        screen.style.opacity = "0.2";
        screen.innerText = "Privacy Mode 🔒";
      } else {
        screen.style.opacity = "1";
        screen.innerText = "Safe View 👀";
      }
    });
  }

  screen.innerText = "Tap to Start";

  document.body.addEventListener("click", start, { once: true });
</script>
