<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Privacy Screen Demo</title>
<style>
body {
  font-family: -apple-system, sans-serif;
  background: #f5f5f7;
  text-align: center;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 30px;
  margin-top: 20px;
  position: relative;
  overflow: hidden;
}

.overlay {
  position: absolute;
  inset: 0;
  background: black;
  opacity: 0;
  transition: opacity 0.2s ease;
  pointer-events: none;
}

button {
  background: #ff3b30;
  border: none;
  padding: 15px 25px;
  border-radius: 12px;
  color: white;
  font-size: 16px;
  margin-top: 30px;
}

.stats {
  margin-top: 20px;
  font-size: 14px;
  color: #555;
}
</style>
</head>
<body>

<h2>Privacy Screen Demo</h2>

<div class="card">
  <div class="overlay" id="overlay"></div>
  <h3>🔒 Confidential</h3>
  <p>This content is only visible when your phone faces you directly.<br>
  Tilt away to see the privacy effect.</p>
</div>

<div class="stats">
  Pitch: <span id="pitch">0</span><br>
  Roll: <span id="roll">0</span><br>
  Darkness: <span id="darkness">0%</span>
</div>

<button onclick="toggleDemo()" id="btn">Start Demo</button>

<script>
let running = false;

function toggleDemo() {
  if (!running) {
    startDemo();
    document.getElementById("btn").innerText = "Stop Demo";
  } else {
    window.removeEventListener("deviceorientation", handleOrientation);
    document.getElementById("overlay").style.opacity = 0;
    document.getElementById("btn").innerText = "Start Demo";
  }
  running = !running;
}

function startDemo() {
  if (typeof DeviceOrientationEvent.requestPermission === "function") {
    DeviceOrientationEvent.requestPermission().then(permissionState => {
      if (permissionState === "granted") {
        window.addEventListener("deviceorientation", handleOrientation);
      }
    });
  } else {
    window.addEventListener("deviceorientation", handleOrientation);
  }
}

function handleOrientation(event) {
  const pitch = event.beta * Math.PI / 180;
  const roll = event.gamma * Math.PI / 180;

  document.getElementById("pitch").innerText = pitch.toFixed(2) + " rad";
  document.getElementById("roll").innerText = roll.toFixed(2) + " rad";

  const tiltMagnitude = Math.sqrt(pitch*pitch + roll*roll);
  const darkness = Math.min(1, tiltMagnitude / 1.5);

  document.getElementById("overlay").style.opacity = darkness;
  document.getElementById("darkness").innerText = Math.round(darkness * 100) + "%";
}
</script>

</body>
</html>
